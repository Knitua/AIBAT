<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1320 920" role="img" aria-label="BAT1K 到 NCBI 可用注释数据筛选漏斗">
  <style>
    .title { font: 700 34px "Noto Sans SC", "Microsoft YaHei", Arial, sans-serif; fill: #172321; }
    .subtitle { font: 400 20px "Noto Sans SC", "Microsoft YaHei", Arial, sans-serif; fill: #5e6b67; }
    .step-title { font: 700 18px "Noto Sans SC", "Microsoft YaHei", Arial, sans-serif; fill: #ffffff; }
    .step-value { font: 500 14px "Noto Sans SC", "Microsoft YaHei", Arial, sans-serif; fill: rgba(255,255,255,0.86); }
    .note { font: 500 16px "Noto Sans SC", "Microsoft YaHei", Arial, sans-serif; fill: #5e6b67; }
  </style>
  <rect width="1320" height="920" rx="18" fill="#fbfaf7" />
  <text x="64" y="58" class="title">BAT1K 到可用注释数据的筛选漏斗</text>
  <text x="64" y="92" class="subtitle">从项目状态表出发，逐步收敛到公开、可下载、可用于蛋白和编码序列分析的数据。</text>
  
  <g>
    <rect x="190.0" y="132" width="940.0" height="52" rx="10" fill="#b84f3a" />
    <text x="660.0" y="155" text-anchor="middle" class="step-title">BAT1K 原始状态表</text>
    <text x="660.0" y="175" text-anchor="middle" class="step-value">1,469 条记录 / 1,457 个物种</text>
  </g>
  <path d="M 660.0 188 L 660.0 201" stroke="#9aa9a4" stroke-width="2" stroke-linecap="round" />
  <path d="M 654.0 195 L 660.0 202 L 666.0 195" fill="none" stroke="#9aa9a4" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
  <g>
    <rect x="430.3" y="210" width="459.5" height="52" rx="10" fill="#c76c4f" />
    <text x="660.0" y="233" text-anchor="middle" class="step-title">测序完成</text>
    <text x="660.0" y="253" text-anchor="middle" class="step-value">158 条记录 / 153 个物种</text>
  </g>
  <path d="M 660.0 266 L 660.0 279" stroke="#9aa9a4" stroke-width="2" stroke-linecap="round" />
  <path d="M 654.0 273 L 660.0 280 L 666.0 273" fill="none" stroke="#9aa9a4" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
  <g>
    <rect x="441.9" y="288" width="436.1" height="52" rx="10" fill="#d4896a" />
    <text x="660.0" y="311" text-anchor="middle" class="step-title">组装完成</text>
    <text x="660.0" y="331" text-anchor="middle" class="step-value">126 条记录 / 121 个物种</text>
  </g>
  <path d="M 660.0 344 L 660.0 357" stroke="#9aa9a4" stroke-width="2" stroke-linecap="round" />
  <path d="M 654.0 351 L 660.0 358 L 666.0 351" fill="none" stroke="#9aa9a4" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
  <g>
    <rect x="456.4" y="366" width="407.3" height="52" rx="10" fill="#dfa386" />
    <text x="660.0" y="389" text-anchor="middle" class="step-title">注释完成</text>
    <text x="660.0" y="409" text-anchor="middle" class="step-value">91 条记录 / 87 个物种</text>
  </g>
  <path d="M 660.0 422 L 660.0 435" stroke="#9aa9a4" stroke-width="2" stroke-linecap="round" />
  <path d="M 654.0 429 L 660.0 436 L 666.0 429" fill="none" stroke="#9aa9a4" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
  <g>
    <rect x="457.3" y="444" width="405.5" height="52" rx="10" fill="#9fbdb4" />
    <text x="660.0" y="467" text-anchor="middle" class="step-title">去重后用于 NCBI 查询</text>
    <text x="660.0" y="487" text-anchor="middle" class="step-value">89 条记录 / 87 个物种</text>
  </g>
  <path d="M 660.0 500 L 660.0 513" stroke="#9aa9a4" stroke-width="2" stroke-linecap="round" />
  <path d="M 654.0 507 L 660.0 514 L 666.0 507" fill="none" stroke="#9aa9a4" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
  <g>
    <rect x="477.0" y="522" width="365.9" height="52" rx="10" fill="#88aaa2" />
    <text x="660.0" y="545" text-anchor="middle" class="step-title">NCBI 找到 assembly accession</text>
    <text x="660.0" y="565" text-anchor="middle" class="step-value">50 条记录 / 49 个物种</text>
  </g>
  <path d="M 660.0 578 L 660.0 591" stroke="#9aa9a4" stroke-width="2" stroke-linecap="round" />
  <path d="M 654.0 585 L 660.0 592 L 666.0 585" fill="none" stroke="#9aa9a4" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
  <g>
    <rect x="490.7" y="600" width="338.5" height="52" rx="10" fill="#6f958f" />
    <text x="660.0" y="623" text-anchor="middle" class="step-title">NCBI 有可下载注释资产</text>
    <text x="660.0" y="643" text-anchor="middle" class="step-value">29 条记录 / 28 个物种</text>
  </g>
  <path d="M 660.0 656 L 660.0 669" stroke="#9aa9a4" stroke-width="2" stroke-linecap="round" />
  <path d="M 654.0 663 L 660.0 670 L 666.0 663" fill="none" stroke="#9aa9a4" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
  <g>
    <rect x="494.6" y="678" width="330.8" height="52" rx="10" fill="#527a77" />
    <text x="660.0" y="701" text-anchor="middle" class="step-title">染色体级且有注释</text>
    <text x="660.0" y="721" text-anchor="middle" class="step-value">24 条记录 / 23 个物种</text>
  </g>
  <path d="M 660.0 734 L 660.0 747" stroke="#9aa9a4" stroke-width="2" stroke-linecap="round" />
  <path d="M 654.0 741 L 660.0 748 L 666.0 741" fill="none" stroke="#9aa9a4" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
  <g>
    <rect x="508.1" y="756" width="303.7" height="52" rx="10" fill="#123d4a" />
    <text x="660.0" y="779" text-anchor="middle" class="step-title">GCF + Chromosome + RefSeq</text>
    <text x="660.0" y="799" text-anchor="middle" class="step-value">10 条记录 / 10 个物种</text>
  </g>
  <text x="64" y="878" class="note">最终主分析进一步固定为 23 个染色体级蝙蝠 + 74 个染色体级非蝙蝠对照。</text>
</svg>
